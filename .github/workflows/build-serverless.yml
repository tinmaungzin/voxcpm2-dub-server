name: build-serverless
on:
  push:
    paths: [ 'handler.py', 'Dockerfile.serverless', '.github/workflows/build-serverless.yml' ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with: { registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      - name: Build and push serverless image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.serverless
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/voxcpm2-dub-server:serverless
